version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: alsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-alsm_ui}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alsm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alsm-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-alsm_ui}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AUTHENTIK_URL: ${AUTHENTIK_URL}
      AUTHENTIK_TOKEN: ${AUTHENTIK_TOKEN}
      LDAP_HOST: ${LDAP_HOST:-172.17.0.1}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      CORS_ORIGIN: http://localhost:3331
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alsm-network

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ws://localhost:3333
    container_name: alsm-frontend
    restart: unless-stopped
    ports:
      - "3331:3331"
    depends_on:
      - backend
    networks:
      - alsm-network

networks:
  alsm-network:
    driver: bridge

volumes:
  postgres_data:
