services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ogun-bridge-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: production
      PORT: 3333
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ogun_bridge}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AUTHENTIK_URL: ${AUTHENTIK_URL}
      AUTHENTIK_TOKEN: ${AUTHENTIK_TOKEN}
      AUTHENTIK_OIDC_ISSUER: ${AUTHENTIK_OIDC_ISSUER}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_REDIRECT_URI: ${AUTHENTIK_REDIRECT_URI:-https://ogun.spectres.co.za/auth/callback}
      SESSION_SECRET: ${SESSION_SECRET}
      LDAP_HOST: ${LDAP_HOST:-172.17.0.1}
      LDAP_PORT: ${LDAP_PORT:-389}
      LDAP_BIND_DN: ${LDAP_BIND_DN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SUPER_ADMIN_PASS: ${SUPER_ADMIN_PASS}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_USER: ${SUPER_ADMIN_USER}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://ogun.spectres.co.za}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Ogun Bridge}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      MAILSERVER_ENABLED: ${MAILSERVER_ENABLED:-true}
      MAILSERVER_DOMAIN: ${MAILSERVER_DOMAIN:-spectres.co.za}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3333/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ogun-network
      - thoth-network

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /socket.io
    container_name: ogun-bridge-frontend
    restart: unless-stopped
    ports:
      - "3331:3331"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:3331/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ogun-network

networks:
  ogun-network:
    driver: bridge
  thoth-network:
    external: true
    name: thoth-esu-gateway_default
